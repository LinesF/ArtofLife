name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 깃허브 Pages 배포에 필요한 기본 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 제어 (대기 중인 이전 배포 취소)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Static Site Builder
        run: |
          python build.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
